services:
  postgres:
    ports: []
    restart: always

  redis:
    ports: []
    restart: always

  api:
    restart: always
    environment:
      APP_ENV: production
      LOG_LEVEL: INFO
      GUNICORN_WORKERS: "2"
      GUNICORN_TIMEOUT: "120"

  worker:
    restart: always
    environment:
      APP_ENV: production
      LOG_LEVEL: INFO
      CELERY_LOG_LEVEL: INFO
      CELERY_CONCURRENCY: "4"

  nginx:
    restart: always
